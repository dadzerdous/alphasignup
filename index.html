<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evolution Side-Scroller | SingleFrameGames 0.0.03</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; background: linear-gradient(#001, #003); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 10; }
        .hud { position: absolute; top: 20px; left: 20px; color: #0ff; font-size: 20px; pointer-events: none; }
        .btn { background: none; border: 2px solid #0ff; color: #0ff; padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 1.1rem; width: 280px; }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 15px #0ff; }
        #shop { display: none; text-align: center; }
        footer { position: absolute; bottom: 15px; font-size: 0.8rem; }
        footer a { color: #0ff; text-decoration: none; }
    </style>
</head>
<body>

<div id="hud" class="hud" style="display:none;">Tokens: <span id="tokenCount">0</span> | Speed: <span id="speedVal">1</span></div>

<div id="ui">
    <div id="menu">
        <h1 style="color:#0ff; text-shadow: 0 0 10px #0ff;">EVOLUTION SIDE-SCROLLER</h1>
        <button class="btn" onclick="initGame()">NEW GAME</button>
        <button class="btn" onclick="alert('No save found')">CONTINUE</button>
        <button class="btn" onclick="location.reload()">RESET</button>
        <footer>SINGLEFRAMEGAMES | <a href="mailto:singleframegames@gmail.com">SINGLEFRAMEGAMES@GMAIL.COM</a></footer>
    </div>

    <div id="shop">
        <h2 style="color:red;">WIPE OUT</h2>
        <p id="totalTokens">Tokens: 0</p>
        <button class="btn" onclick="upgradeSpeed()">+ SPEED (5 Tokens)</button>
        <button id="legBtn" class="btn" onclick="upgradeLegs()">EVOLVE LEGS (20 Tokens)</button>
        <br>
        <button class="btn" style="border-color:#fff; color:#fff;" onclick="initGame()">RUN AGAIN</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tokens = 0;
    let speedLevel = 1;
    let hasLegs = false;
    let gameActive = false;

    // Player Object
    const player = {
        x: 100, y: 0, r: 20,
        vx: 0, vy: 0,
        rotation: 0,
        grounded: false
    };

    let platforms = [];
    let collectibles = [];
    let cameraX = 0;
    const gravity = 0.5;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    function initGame() {
        document.getElementById('ui').style.display = 'none';
        document.getElementById('menu').style.display = 'none';
        document.getElementById('shop').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        
        player.y = canvas.height / 2;
        player.vx = 2 + (speedLevel * 0.5);
        player.vy = 0;
        cameraX = 0;
        platforms = [];
        collectibles = [];
        
        // Initial Floor
        for(let i=0; i<5; i++) spawnPlatform(i * 400);
        
        gameActive = true;
        requestAnimationFrame(gameLoop);
    }

    function spawnPlatform(x) {
        const width = 300 + Math.random() * 200;
        const y = canvas.height - 100 - (Math.random() * 150);
        const isRamp = Math.random() > 0.7;
        
        platforms.push({ x, y, w: width, h: 50, isRamp });
        
        // Spawn Token
        collectibles.push({ x: x + width/2, y: y - 50, gathered: false });
    }

    function upgradeSpeed() {
        if(tokens >= 5) { tokens -= 5; speedLevel++; updateUI(); }
    }

    function upgradeLegs() {
        if(tokens >= 20 && !hasLegs) { tokens -= 20; hasLegs = true; updateUI(); document.getElementById('legBtn').innerText = "LEGS: EQUIPPED"; }
    }

    function updateUI() {
        document.getElementById('tokenCount').innerText = tokens;
        document.getElementById('totalTokens').innerText = "Tokens: " + tokens;
        document.getElementById('speedVal').innerText = speedLevel;
    }

    const keys = {};
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function gameLoop() {
        if(!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Physics
        player.vy += gravity;
        player.y += player.vy;
        player.x += player.vx;
        player.rotation += player.vx * 0.05;
        
        cameraX = player.x - 100;
        
        player.grounded = false;
        platforms.forEach(p => {
            // Collision Detection
            if(player.x + player.r > p.x && player.x - player.r < p.x + p.w) {
                let floorY = p.y;
                if(p.isRamp) {
                    // Simple Ramp Logic
                    let relX = (player.x - p.x) / p.w;
                    floorY = p.y - (relX * 60);
                }
                
                if(player.y + player.r > floorY && player.y < floorY + p.h) {
                    player.y = floorY - player.r;
                    player.vy = p.isRamp ? -2 : 0; // Pop up slightly on ramps
                    player.grounded = true;
                }
            }
        });

        // Jump (Legs only)
        if(hasLegs && keys['Space'] && player.grounded) {
            player.vy = -12;
            player.grounded = false;
        }

        // Collect tokens
        collectibles.forEach(c => {
            if(!c.gathered && Math.hypot(player.x - c.x, player.y - c.y) < 30) {
                c.gathered = true;
                tokens++;
                updateUI();
            }
        });

        // Infinite World Gen
        if(platforms[platforms.length-1].x < player.x + canvas.width) {
            spawnPlatform(platforms[platforms.length-1].x + 400 + Math.random() * 100);
        }

        // Draw World
        ctx.save();
        ctx.translate(-cameraX, 0);
        
        platforms.forEach(p => {
            ctx.fillStyle = p.isRamp ? '#555' : '#222';
            ctx.beginPath();
            if(p.isRamp) {
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x + p.w, p.y - 60);
                ctx.lineTo(p.x + p.w, p.y + p.h);
                ctx.lineTo(p.x, p.y + p.h);
            } else {
                ctx.rect(p.x, p.y, p.w, p.h);
            }
            ctx.fill();
        });

        collectibles.forEach(c => {
            if(!c.gathered) {
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(c.x, c.y, 8, 0, Math.PI*2);
                ctx.fill();
            }
        });

        // Draw Player
        ctx.translate(player.x, player.y);
        ctx.rotate(player.rotation);
        ctx.strokeStyle = hasLegs ? '#f0f' : '#0ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, player.r, 0, Math.PI * 2);
        ctx.stroke();
        
        // Draw Legs if evolved
        if(hasLegs) {
            ctx.rotate(-player.rotation); // Keep legs vertical-ish
            ctx.fillStyle = '#f0f';
            let walk = Math.sin(Date.now() * 0.01) * 10;
            ctx.fillRect(-10, 15, 5, 10 + walk);
            ctx.fillRect(5, 15, 5, 10 - walk);
        }
        ctx.restore();

        // Game Over
        if(player.y > canvas.height) {
            gameActive = false;
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('shop').style.display = 'block';
        } else {
            requestAnimationFrame(gameLoop);
        }
    }
</script>
</body>
</html>
